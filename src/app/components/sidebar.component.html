<aside class="sidebar glass-panel">
  <div class="brand">
    <img src="/assets/logo-mark.svg" alt="OrionPlay logo">
    <div class="wordmark">
      <strong>ORION</strong>
      <span>PLAY</span>
    </div>
  </div>

  <nav class="nav">
    <a
      *ngFor="let item of navItems"
      class="nav-link"
      [routerLink]="item.link"
      routerLinkActive="is-active"
    >
      <span class="icon-font">{{ item.icon }}</span>
      {{ item.label }}
    </a>
  </nav>

  <div class="profile" *ngIf="auth.user() as user">
    <div class="avatar" [style.background-image]="avatarStyle"></div>
    <div class="profile-copy">
      <strong>{{ user.Name }}</strong>
      <span class="muted">Ready to watch</span>
    </div>
  </div>

  <button type="button" class="logout" (click)="auth.logout()">
    <span class="icon-font">logout</span>
    Sign Out
  </button>
</aside>
